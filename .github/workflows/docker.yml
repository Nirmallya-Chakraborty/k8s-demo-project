name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build Backend
    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/k8s-demo-backend:v1 ./backend

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/k8s-demo-backend:v1

    # Build Frontend
    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/k8s-demo-frontend:v1 ./frontend

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/k8s-demo-frontend:v1