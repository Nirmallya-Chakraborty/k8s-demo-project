name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: v${{ github.run_number }}

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      #################################################
      # Backend
      #################################################

      - name: Build Backend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/k8s-demo-backend:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.DOCKER_USERNAME }}/k8s-demo-backend:latest \
            ./backend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/k8s-demo-backend:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/k8s-demo-backend:latest

      #################################################
      # Frontend
      #################################################

      - name: Build Frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/k8s-demo-frontend:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.DOCKER_USERNAME }}/k8s-demo-frontend:latest \
            ./frontend

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/k8s-demo-frontend:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/k8s-demo-frontend:latest

      #################################################
      # Deploy to Kubernetes
      #################################################

      - name: Deploy Backend
        run: |
          kubectl set image deployment/backend \
            backend=${{ secrets.DOCKER_USERNAME }}/k8s-demo-backend:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ secrets.DOCKER_USERNAME }}/k8s-demo-frontend:${{ env.IMAGE_TAG }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/frontend

      #################################################
      # Cleanup old Docker images (optional)
      #################################################

      - name: Cleanup
        run: |
          docker image prune -af || true