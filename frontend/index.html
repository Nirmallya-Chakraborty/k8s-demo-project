<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Demo - Login</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="login-box">

        <h1>Kubernetes Demo</h1>
        <p>Login to continue</p>

        <form id="loginForm">

            <div class="input-group">
                <label>Username</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Enter username"
                    required
                >
            </div>

            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter password"
                    required
                >
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <p id="message"></p>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
