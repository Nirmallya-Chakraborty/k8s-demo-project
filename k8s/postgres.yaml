# -----------------------------
# Secret
# -----------------------------
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_DB: demo
  POSTGRES_USER: demo
  POSTGRES_PASSWORD: demo123

---
# -----------------------------
# Persistent Volume
# -----------------------------
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv

spec:
  capacity:
    storage: 1Gi

  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  hostPath:
    path: /data/postgres
    type: DirectoryOrCreate

---
# -----------------------------
# Persistent Volume Claim
# -----------------------------
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: postgres-pvc

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 1Gi

  volumeName: postgres-pv

---
# -----------------------------
# PostgreSQL Deployment
# -----------------------------
apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1

      containers:
      - name: postgres

        image: postgres:16

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB

        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# -----------------------------
# PostgreSQL Service
# -----------------------------
apiVersion: v1
kind: Service

metadata:
  name: postgres-service

spec:
  selector:
    app: postgres

  ports:
  - name: postgres
    port: 5432
    targetPort: 5432

  type: ClusterIP